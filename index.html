<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A.D Nails Malta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  background: #fff;
  color: #333;
}

/* LIGHT BACKGROUND */
body::before,
body::after {
  content: "";
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(120px);
  z-index: -1;
  animation: floatLights 10s infinite alternate ease-in-out;
}

body::before {
  background: #ffb6d5;
  top: -100px;
  left: -100px;
}

body::after {
  background: #c77dff;
  bottom: -120px;
  right: -120px;
}

@keyframes floatLights {
  0% { transform: translate(0,0); }
  100% { transform: translate(80px, -60px); }
}

/* HEADER */
header {
  text-align: center;
  padding: 70px 20px 30px;
  background: linear-gradient(180deg, #ffb6d5, #ffe6f0);
}

h1 {
  font-size: 48px;
  margin: 0;
  color: #b30059;
}

.since {
  font-size: 14px;
  margin-top: 5px;
}

.subtitle {
  font-size: 18px;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 14px 26px;
  background: #25D366;
  color: white;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
}

.phone {
  margin-top: 10px;
  font-size: 14px;
}

/* ROAD */
.road {
  margin-top: 30px;
  height: 90px;
  background: #222;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
}

.car {
  position: absolute;
  top: 25px;
  font-size: 38px;
  animation: drive 5s linear infinite;
  transform: scaleX(-1);
}

.home {
  position: absolute;
  right: 15px;
  top: 18px;
  font-size: 40px;
}

@keyframes drive {
  0% { left: -80px; }
  100% { left: 110%; }
}

/* SECTION */
.section {
  padding: 50px 20px;
  text-align: center;
}

h2 {
  color: #b30059;
}

/* SERVICES */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.card {
  width: 220px;
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* CALENDAR */
.calendar {
  max-width: 800px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

.slot {
  padding: 15px;
  border-radius: 12px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.available {
  background: #25D366;
}

.full {
  background: #e74c3c;
  cursor: not-allowed;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  font-size: 13px;
}
</style>
</head>

<body>

<header>
  <h1>A.D Nails 💅</h1>
  <div class="since">Since 2020</div>
  <p class="subtitle">Mobile Nail Service in Malta</p>

  <a class="btn" href="https://wa.me/35699758628">Book on WhatsApp</a>
  <div class="phone">📞 +356 99 75 86 28</div>

  <div class="road">
    <div class="car">🚗</div>
    <div class="home">🏠</div>
  </div>
</header>

<div class="section">
  <h2>Services</h2>

  <div class="cards">
    <div class="card">Manicure €15–20</div>
    <div class="card">Gel Nails €25–35</div>
    <div class="card">Acrylic €40–50</div>
    <div class="card">Men Manicure €10–15</div>
  </div>
</div>

<div class="section">
  <h2>📅 Available Booking (Next 2 Months)</h2>
  <p>Only 3 slots per week – 8:00 AM (2 hours)</p>

  <div class="calendar" id="calendar"></div>
</div>

<footer>
  © 2026 A.D Nails Malta
</footer>

<script>
const calendar = document.getElementById("calendar");

function generateCalendar() {
  const today = new Date();

  for (let week = 0; week < 8; week++) {
    // Only 3 days per week: Mon (1), Wed (3), Fri (5)
    const days = [1, 3, 5];

    days.forEach(dayOffset => {
      let date = new Date();
      date.setDate(today.getDate() + (week * 7) + dayOffset);

      let dayName = date.toDateString();

      let div = document.createElement("div");
      div.classList.add("slot");

      // 70% chance full (simulate busy calendar)
      let isAvailable = Math.random() > 0.6;

      if (isAvailable) {
        div.classList.add("available");
        div.innerHTML = `
          🟢 AVAILABLE<br>
          ${dayName}<br>
          08:00 - 10:00
        `;

        div.onclick = () => {
          window.open("https://wa.me/35699758628?text=Hi%20I%20want%20to%20book%208am%20appointment", "_blank");
        };

      } else {
        div.classList.add("full");
        div.innerHTML = `
          🔴 FULL<br>
          ${dayName}<br>
          08:00 - 10:00
        `;
      }

      calendar.appendChild(div);
    });
  }
}

generateCalendar();
</script>

</body>
</html>
