<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A.D Nails Malta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #ffe6f0, #ffffff);
  color: #333;
}

/* HEADER */
header {
  text-align: center;
  padding: 80px 20px 40px;
  background: linear-gradient(180deg, #ffb6d5, #ffe6f0);
}

h1 {
  font-size: 48px;
  margin: 0;
  color: #b30059;
}

.since {
  font-size: 14px;
  margin-top: 5px;
  color: #444;
}

.subtitle {
  margin-top: 10px;
  font-size: 18px;
}

.badge {
  display: inline-block;
  margin-top: 10px;
  padding: 6px 14px;
  background: black;
  color: white;
  border-radius: 20px;
  font-size: 12px;
}

.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 14px 26px;
  background: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
}

/* ROAD */
.road {
  margin-top: 40px;
  height: 90px;
  background: #222;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
}

/* CAR (FIXED DIRECTION) */
.car {
  position: absolute;
  top: 25px;
  font-size: 38px;
  animation: drive 5s linear infinite;
}

/* HOME */
.home {
  position: absolute;
  right: 15px;
  top: 18px;
  font-size: 40px;
}

/* FORWARD ANIMATION (LEFT → RIGHT) */
@keyframes drive {
  0% {
    left: -80px;
  }
  100% {
    left: 110%;
  }
}

/* SECTIONS */
.section {
  padding: 60px 20px;
  text-align: center;
}

h2 {
  color: #b30059;
}

/* CARDS */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.card {
  background: white;
  width: 240px;
  padding: 18px;
  border-radius: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* FLOAT BUTTON */
.float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 14px 16px;
  border-radius: 50px;
  font-size: 18px;
  text-decoration: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  font-size: 13px;
  background: #fff;
  margin-top: 40px;
}
</style>
</head>

<body>

<header>
  <h1>A.D Nails 💅</h1>
  <div class="since">Since 2020</div>

  <p class="subtitle">Luxury Mobile Nail Service in Malta</p>

  <div class="badge">✨ I come to your home</div>
  <div class="badge">💅 Clean • Professional • Affordable</div>

  <br />

  <a class="btn" href="https://wa.me/35699758628" target="_blank">
    Book on WhatsApp
  </a>

  <div class="road">
    <div class="car">🚗</div>
    <div class="home">🏠</div>
  </div>
</header>

<div class="section">
  <h2>Services</h2>

  <div class="cards">
    <div class="card"><h3>Manicure</h3><p>€15 - €20</p></div>
    <div class="card"><h3>Gel Nails</h3><p>€25 - €35</p></div>
    <div class="card"><h3>Acrylic Set</h3><p>€40 - €50</p></div>
    <div class="card"><h3>Nail Art</h3><p>From €5</p></div>
  </div>
</div>

<a class="float" href="https://wa.me/35699758628">💬</a>

<footer>
  © 2026 A.D Nails Malta | WhatsApp +356 99 75 86 28
</footer>

</body>
</html>
</footer>

</body>
</html>
