<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.D Nails Malta</title>

<style>
body {
  margin:0;
  font-family:Arial;
  text-align:center;
}

/* HEADER */
header {
  padding:60px 20px;
  background:linear-gradient(180deg,#ffb6d5,#ffe6f0);
}

h1 {color:#b30059;margin:0;}
.since {font-size:14px;}

.btn {
  margin-top:15px;
  display:inline-block;
  padding:12px 20px;
  background:#25D366;
  color:white;
  border-radius:10px;
  text-decoration:none;
}

/* CALENDAR */
.calendar, .times {
  max-width:900px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

.box {
  padding:15px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.available { background:#2ecc71; }
.full { background:#e74c3c; cursor:not-allowed;}
.closed { background:#555; cursor:not-allowed;}

.back {
  margin:15px;
  display:inline-block;
  cursor:pointer;
  color:#b30059;
}
</style>
</head>

<body>

<header>
  <h1>A.D Nails 💅</h1>
  <div class="since">Since 2020</div>
  <a class="btn" href="https://wa.me/35699758628">Book on WhatsApp</a>
  <div>📞 +356 99 75 86 28</div>
</header>

<h2>Select Date</h2>

<div id="calendar" class="calendar"></div>

<div id="timesSection" style="display:none;">
  <div class="back" onclick="goBack()">⬅ Back to Dates</div>
  <h2 id="selectedDate"></h2>
  <div id="times" class="times"></div>
</div>

<script>
const calendar = document.getElementById("calendar");
const timesSection = document.getElementById("timesSection");
const timesDiv = document.getElementById("times");
const selectedDateText = document.getElementById("selectedDate");

let today = new Date();

// generate dates (2 months)
for (let i = 0; i < 60; i++) {
  let date = new Date();
  date.setDate(today.getDate() + i);

  let day = date.getDay();
  let textDate = date.toDateString();

  let div = document.createElement("div");
  div.classList.add("box");

  if (day === 0) {
    div.classList.add("closed");
    div.innerHTML = `CLOSED<br>${textDate}`;
  }
  else if (day === 1 || day === 3 || day === 5) {
    div.classList.add("available");
    div.innerHTML = `AVAILABLE<br>${textDate}`;
    div.onclick = () => showTimes(textDate);
  }
  else {
    div.classList.add("full");
    div.innerHTML = `FULL<br>${textDate}`;
  }

  calendar.appendChild(div);
}

// show times (5 slots)
function showTimes(dateText) {
  calendar.style.display = "none";
  timesSection.style.display = "block";
  selectedDateText.innerText = dateText;

  timesDiv.innerHTML = "";

  const times = ["08:00","10:00","12:00","14:00","16:00"];

  times.forEach(time => {
    let div = document.createElement("div");
    div.classList.add("box");

    // only 1 slot free (8:00), others full
    if (time === "08:00") {
      div.classList.add("available");
      div.innerHTML = `🟢 ${time}`;

      div.onclick = () => {
        window.open(`https://wa.me/35699758628?text=Hi I want to book ${dateText} at ${time}`);
      };
    } else {
      div.classList.add("full");
      div.innerHTML = `🔴 ${time}`;
    }

    timesDiv.appendChild(div);
  });
}

function goBack() {
  calendar.style.display = "grid";
  timesSection.style.display = "none";
}
</script>

</body>
</html>
