<div id="calendar-controls">
  <button onclick="toggleAvailable()" id="filterBtn">Show Available Only</button>
</div>

<div id="calendar"></div>

<style>
#calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  padding: 10px;
}

.day {
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  background: #eee;
  font-weight: bold;
}

.available {
  background: #2ecc71;
  color: white;
  cursor: pointer;
}

.booked {
  background: #e74c3c;
  color: white;
  pointer-events: none;
}

.closed {
  background: #bdbdbd;
  color: #666;
  pointer-events: none;
}

.hidden {
  display: none;
}

.header-days {
  font-weight: bold;
  text-align: center;
  padding: 5px;
}
</style>

<script>
const months = [
  {name:"April", days:30},
  {name:"May", days:31},
  {name:"June", days:30}
];

let showOnlyAvailable = false;

// generate exactly 13 slots per month
function generateSlots(days) {
  let slots = {};
  let used = new Set();

  while(Object.keys(slots).length < 13) {
    let d = Math.floor(Math.random() * days) + 1;
    let date = new Date(2024, 3, d);
    let day = date.getDay();

    if(day === 0) continue; // Sunday skip
    if(used.has(d)) continue;

    used.add(d);

    const times = [
      "08:00–10:00",
      "10:00–12:00",
      "12:00–14:00",
      "14:00–16:00",
      "16:00–18:00"
    ];

    slots[d] = times[Math.floor(Math.random() * times.length)];
  }

  return slots;
}

const data = {
  April: generateSlots(30),
  May: generateSlots(31),
  June: generateSlots(30)
};

function render() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const daysHeader = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  daysHeader.forEach(d=>{
    let el = document.createElement("div");
    el.className = "header-days";
    el.innerText = d;
    cal.appendChild(el);
  });

  months.forEach(m => {
    for(let i=1;i<=m.days;i++) {
      let date = new Date(2024, months.indexOf(m)+3, i);
      let day = date.getDay();

      let div = document.createElement("div");
      div.className = "day";
      div.innerText = i;

      const isAvailable = data[m.name][i];

      // Sunday closed
      if(day === 0) {
        div.classList.add("closed");
      }
      // available
      else if(isAvailable) {
        div.classList.add("available");

        div.onclick = () => {
          let msg = `Booking: ${m.name} ${i} at ${data[m.name][i]}`;
          window.open("https://wa.me/XXXXXXXXXX?text=" + encodeURIComponent(msg));
        };
      }
      // booked
      else {
        div.classList.add("booked");
      }

      if(showOnlyAvailable && !isAvailable) {
        div.classList.add("hidden");
      }

      cal.appendChild(div);
    }
  });
}

function toggleAvailable() {
  showOnlyAvailable = !showOnlyAvailable;
  document.getElementById("filterBtn").innerText =
    showOnlyAvailable ? "Show All" : "Show Available Only";
  render();
}

render();
</script>
